<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Music Studio - Anti-Crash</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        .custom-progress-bg {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1); 
            border-radius: 10px; overflow: hidden; margin-top: 8px;
        }
        .custom-progress-fill {
            width: 0%; height: 100%; background: var(--st-converting); 
            transition: width 0.3s ease; border-radius: 10px;
        }
        .ready .custom-progress-fill { background: var(--st-ready); }
        .error .custom-progress-fill { background: var(--st-error); }
    </style>
</head>
<body>

<header class="app-header glass">
    <h1>🎵 Music Studio</h1>
</header>

<main class="app-main">
    <section class="panel glass">
        <div class="input-group">
            <label for="modName">Nombre del Mod</label>
            <input type="text" id="modName" placeholder="Ej. Mis Éxitos" required>
        </div>

        <div class="input-group">
            <label for="modDesc">Descripción</label>
            <input type="text" id="modDesc" placeholder="Ej. Paquete de los 22 discos" required>
        </div>

        <div class="input-group">
            <label for="modIcon">📸 Imagen de Portada (pack_icon.png)</label>
            <input type="file" id="modIcon" accept="image/png, image/jpeg" required class="file-input">
        </div>
    </section>

    <section class="panel glass bulk-panel">
        <div class="bulk-content">
            <h3>📥 Carga Rápida en Lote</h3>
            <p>Selecciona varios archivos a la vez para llenar los discos automáticamente.</p>
            <label for="bulkSongs" class="btn-action primary-glow">Elegir Múltiples Audios</label>
            <input type="file" id="bulkSongs" accept="audio/*" multiple style="display:none;">
        </div>
    </section>

    <section class="disc-list" id="discsGrid"></section>
</main>

<div class="bottom-bar glass">
    <div id="globalStatus">Esperando audios...</div>
    <button id="generateBtn" class="btn-generate">🚀 Empaquetar Mod</button>
</div>

<script>
    const DISCS = [
        "11", "13", "blocks", "cat", "chirp", "far", 
        "mall", "mellohi", "stal", "strad", "wait", "ward", 
        "pigstep", "otherside", "5", "relic", "precipice", 
        "creator", "creator_music_box", "tears", "bounce", "lava_chicken"
    ];

    let slotsData = DISCS.map(name => ({ discName: name, file: null, blob: null, status: 'empty', progress: 0 }));
    let conversionQueue = [];
    let isProcessingQueue = false;

    function initGrid() {
        const grid = document.getElementById('discsGrid');
        slotsData.forEach((slot, index) => {
            const card = document.createElement('div');
            card.className = `disc-card empty`;
            card.id = `card-${index}`;
            card.innerHTML = `
                <div class="card-header">
                    <div class="disc-icon">💿</div>
                    <div class="disc-info">
                        <h3>Disco: ${slot.discName}</h3>
                        <p id="name-${index}">Vacío</p>
                    </div>
                    <button class="btn-close" onclick="clearSlot(${index})">✕</button>
                </div>
                <div class="custom-progress-bg">
                    <div id="progress-${index}" class="custom-progress-fill"></div>
                </div>
                <div class="card-actions">
                    <button class="btn-action secondary" onclick="triggerIndividualUpload(${index})">
                        Subir Audio
                    </button>
                    <input type="file" id="input-${index}" accept="audio/*" style="display:none;" onchange="handleIndividualUpload(this, ${index})">
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.triggerIndividualUpload = function(index) { document.getElementById(`input-${index}`).click(); };
    window.handleIndividualUpload = function(input, index) {
        if (input.files.length > 0) { assignFileToSlot(input.files[0], index); input.value = ""; }
    };
    window.clearSlot = function(index) {
        conversionQueue = conversionQueue.filter(item => item !== index);
        slotsData[index] = { ...slotsData[index], file: null, blob: null, status: 'empty', progress: 0 };
        updateCardUI(index);
    };

    document.getElementById('bulkSongs').addEventListener('change', (e) => {
        const files = e.target.files;
        let fileIndex = 0;
        for (let i = 0; i < slotsData.length; i++) {
            if (fileIndex >= files.length) break;
            if (slotsData[i].status === 'empty' || slotsData[i].status === 'error') {
                assignFileToSlot(files[fileIndex], i);
                fileIndex++;
            }
        }
        e.target.value = ""; 
    });

    function assignFileToSlot(file, index) {
        slotsData[index] = { ...slotsData[index], file, blob: null, status: 'converting', progress: 0 };
        updateCardUI(index);
        if (!conversionQueue.includes(index)) {
            conversionQueue.push(index);
            processQueue();
        }
    }

    function updateCardUI(index) {
        const slot = slotsData[index];
        const card = document.getElementById(`card-${index}`);
        const nameText = document.getElementById(`name-${index}`);
        const progressBar = document.getElementById(`progress-${index}`);

        card.className = `disc-card ${slot.status}`;
        progressBar.style.width = `${slot.progress}%`;

        if (slot.status === 'empty') {
            nameText.innerText = "Vacío";
        } else if (slot.status === 'converting') {
            nameText.innerText = `⏳ Convirtiendo: ${slot.progress}%`;
        } else if (slot.status === 'ready') {
            nameText.innerText = `🎵 Listo`;
        } else if (slot.status === 'error') {
            nameText.innerText = `❌ Error de memoria, reintenta`;
        }
    }

    // EL NUEVO CEREBRO: Crea y destruye el convertidor por cada canción para que la RAM nunca se llene
    async function processQueue() {
        if (isProcessingQueue) return;
        isProcessingQueue = true;

        const { createFFmpeg, fetchFile } = FFmpeg;

        while (conversionQueue.length > 0) {
            const index = conversionQueue.shift();
            if (slotsData[index].status === 'empty') continue;

            slotsData[index].status = 'converting';
            slotsData[index].progress = 0;
            updateCardUI(index);

            // Damos 500ms al celular para respirar y actualizar la pantalla
            await new Promise(r => setTimeout(r, 500));

            let ffmpegInstance = null;

            try {
                // 1. Crear una instancia fresca y limpia
                document.getElementById('globalStatus').innerText = `Liberando RAM para el disco ${slotsData[index].discName}...`;
                
                ffmpegInstance = createFFmpeg({ 
                    corePath: 'https://unpkg.com/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js',
                    log: false 
                });

                ffmpegInstance.setProgress(({ ratio }) => {
                    let pct = Math.round(Math.max(0, Math.min(1, ratio)) * 100);
                    slotsData[index].progress = pct;
                    updateCardUI(index);
                });

                await ffmpegInstance.load();
                document.getElementById('globalStatus').innerText = `✅ Procesando disco ${slotsData[index].discName}`;

                const file = slotsData[index].file;
                const ext = file.name.split('.').pop() || 'mp3';
                const inputName = `input_${index}.${ext}`;
                const outputName = `out_${index}.ogg`;

                ffmpegInstance.FS('writeFile', inputName, await fetchFile(file));
                
                // 2. Ejecutar conversión
                await ffmpegInstance.run('-i', inputName, '-c:a', 'libvorbis', '-q:a', '2', outputName);
                
                const data = ffmpegInstance.FS('readFile', outputName);
                slotsData[index].blob = data.buffer;
                slotsData[index].status = 'ready';
                slotsData[index].progress = 100;

            } catch (err) {
                console.error("Fallo en disco " + index, err);
                slotsData[index].status = 'error';
            } finally {
                // 3. LA MAGIA: Forzamos la destrucción de la instancia para vaciar la memoria RAM
                if (ffmpegInstance) {
                    try { ffmpegInstance.exit(); } catch(e) { console.log("Instancia cerrada"); }
                }
                updateCardUI(index);
                // Le damos al celular 1 segundo entero para limpiar su basura de la memoria
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        
        isProcessingQueue = false;
        document.getElementById('globalStatus').innerText = "✅ Todos los audios procesados";
    }

    document.getElementById('generateBtn').addEventListener('click', async () => {
        const name = document.getElementById('modName').value;
        const desc = document.getElementById('modDesc').value;
        const iconFile = document.getElementById('modIcon').files[0];
        const statusEl = document.getElementById('globalStatus');
        const btn = document.getElementById('generateBtn');

        if (!name || !desc || !iconFile) { alert("Completa el Nombre, Descripción e Icono."); return; }

        const missingDiscs = slotsData.filter(s => s.status !== 'ready').map(s => s.discName);
        if (missingDiscs.length > 0) { alert(`Aún faltan discos por llenar: ${missingDiscs.join(', ')}`); return; }

        try {
            btn.disabled = true;
            statusEl.innerText = "Empaquetando mod, no cierres la app...";

            const zip = new JSZip();
            
            const manifest = {
                format_version: 2,
                header: { name: name, description: desc, uuid: crypto.randomUUID(), version: [1, 0, 0], min_engine_version: [1, 16, 0] },
                modules: [{ type: "resources", uuid: crypto.randomUUID(), description: desc, version: [1, 0, 0] }]
            };
            zip.file("manifest.json", JSON.stringify(manifest, null, 2));
            zip.file("pack_icon.png", iconFile);

            const soundDefinitions = {
                format_version: "1.21.0",
                sound_definitions: {}
            };

            const recordsFolder = zip.folder("sounds").folder("music").folder("game").folder("records");
            
            slotsData.forEach(slot => {
                recordsFolder.file(`${slot.discName}.ogg`, slot.blob);
                soundDefinitions.sound_definitions[`record.${slot.discName}`] = {
                    category: "record",
                    stream: true,
                    sounds: [`sounds/music/game/records/${slot.discName}`]
                };
            });

            zip.folder("sounds").file("sound_definitions.json", JSON.stringify(soundDefinitions, null, 2));

            const blob = await zip.generateAsync({ type: "blob" });
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = downloadUrl;
            a.download = `${name.replace(/\s+/g, '_')}.mcpack`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(downloadUrl);

            statusEl.innerText = "¡Listo para instalar!";
            statusEl.style.color = "#10b981";
        } catch (error) {
            statusEl.innerText = "Error crítico.";
            statusEl.style.color = "#ef4444";
        } finally {
            btn.disabled = false;
        }
    });

    document.addEventListener('DOMContentLoaded', initGrid);
</script>
</body>
</html>
